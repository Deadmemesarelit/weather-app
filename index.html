<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    
    <script src="index.js" defer></script>
    <title>Weather App</title>
</head>
<body>
    <div class="weather-info">
        
            <input type="text" class="search-bar">

            <div class="error-404 hidden" id="hide-display">City not found❗</div>
            <div class="opening-words">Please Search for a city...</div>
            <div class="date" id="BebasNeue">February 26th, 2026</div>
            <div class="temp-city-container">
                <div class="temp"><span class="temp-value">26</span><span class="temp-unit">°C</span></div>
                <div class="city-name">Pueblo Colorado</div>
            </div>

            <div class="wind-water-container">
                <div class="humidity">Humidity <span class="humidity-data"> 100</span>%💧</div>
                <div class="wind">Wind <span class="wind-data"> 20 </span> m/s💨</div>
            </div>
            
            <div class="next-day-container">
                <div class="day">
                <h5 class="next-day">${date}</h5>
                <img src="https://openweathermap.org/img/wn/${icon}@2x.png" alt="weather icon">
                <h5 class="next-day-degree">${temp} °C</h5>
            </div>
                
                
            </div>
    </div>
    <div class="toggle-degree-modes-container">
        <button class="toggle-degree-mode" id="BebasNeue">Switch to Fahrenheit</button>
    </div>
    
</body>
</html>
