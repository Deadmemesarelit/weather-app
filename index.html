<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    
    <script src="index.js" defer></script>
    <title>Weather App</title>
</head>
<body>
    <div class="weather-info">
        
            <input type="text" class="search-bar">

            <div class="error-404 hidden" id="hide-display">City not found❗</div>
            <div class="opening-words">Please Search for a city...</div>
            <div class="date" id="BebasNeue">February 26th, 2026</div>
            <div class="temp-city-container">
                <div class="temp">26 °C</div>
                <div class="city-name">Pueblo Colorado</div>
            </div>

            <div class="wind-water-container">
                <div class="humidity">Humidity <span class="humidity-data"> 100</span>%💧</div>
                <div class="wind">Wind <span class="wind-data"> 20 </span> m/s💨</div>
            </div>
            
            <div class="next-day-container">
               
                
                
            </div>
    </div>

   

    
</body>
</html>
